name: ruff 🧹

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check src/ tests/"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src/ tests/"
