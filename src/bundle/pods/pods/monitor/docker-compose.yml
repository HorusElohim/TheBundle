services:
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - monitoring

  gpu-exporter:
    image: nvidia/dcgm-exporter:latest
    runtime: nvidia
    environment:
      DCGM_EXPORTER_LISTEN: ":9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    networks:
      - monitoring
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    privileged: true
    pid: "host"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    user: "0"
    depends_on:
      - cadvisor
      - node-exporter
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - path: ".env.grafana"
        required: true
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring

  nginx:
    image: nginx:1.27.3-alpine
    restart: always
    depends_on:
      - prometheus
      - grafana
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - default
      - monitoring

networks:
  default:
    name: default_network
  monitoring:
    name: monitoring_network

volumes:
  cache:
    driver: local
  prometheus_data:
    external: false
  grafana_data:
    external: false
  openvpn_data:
    driver: local
