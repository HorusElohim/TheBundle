services:
  discord-music:
    build:
      context: ../../../../..
      dockerfile: src/bundle/pods/pods/discord-music/Dockerfile
    image: nextgen/discord-music:local
    container_name: nextgen-discord-music
    restart: unless-stopped
    init: true
    cap_add:
      - SYS_NICE
    network_mode: "host"
    env_file:
      - path: .discord.env
        required: true
