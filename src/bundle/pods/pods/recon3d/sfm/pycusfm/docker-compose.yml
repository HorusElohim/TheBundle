services:
  pycusfm:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        BASE_TAG: latest
        PYCUSFM_VERSION: main
    image: thebundle/recon3d/sfm/pycusfm:latest
    container_name: thebundle.recon3d.sfm.pycusfm
    restart: unless-stopped
    gpus: all
    tty: true
    stdin_open: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYCUSFM_DIR=/opt/pycusfm
      - RECON3D_DATA_ROOT=/workspace/data
    volumes:
      - ../../../../../../../:/opt/thebundle
      - ./workspace:/workspace
      - ../../data:/workspace/data
    command: ["sleep", "infinity"]
