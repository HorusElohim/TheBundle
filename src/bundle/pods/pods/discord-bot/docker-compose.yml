services:
  discord-bot:
    build:
      context: ../../../../..
      dockerfile: src/bundle/pods/pods/discord-bot/Dockerfile
    image: thebundle/discord-bot:local
    container_name: thebundle-discord-bot
    restart: unless-stopped
    init: true
    tty: true
    cap_add:
      - SYS_NICE
    network_mode: "host"
    env_file:
      - path: .discord.env
        required: true
